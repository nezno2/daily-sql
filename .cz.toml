[tool.commitizen]
name = "cz_conventional_commits"
tag_format = "$version"
version_scheme = "semver"
version = "0.18.0"
update_changelog_on_bump = true
major_version_zero = true

[tool.commitizen.customize]
bump_pattern = "^(break|feat|fix|bugfix|hotfix)"
bump_map = { "feat" = "MINOR", "fix" = "PATCH", "bugfix" = "PATCH", "hotfix" = "PATCH", "break" = "MAJOR" }